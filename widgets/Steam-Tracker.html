<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NOCTABLOB · Steam Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;}
  body{font-family:'IBM Plex Mono',monospace;color:#f0f0ee;-webkit-font-smoothing:antialiased;}

  #tracker{
    position:relative;width:800px;height:400px;
    border-radius:22px;
    background:rgba(10,10,13,0.74);
    -webkit-backdrop-filter:blur(18px) saturate(1.1);
    backdrop-filter:blur(18px) saturate(1.1);
    box-shadow:0 18px 60px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(240,240,238,0.07);
    padding:42px 46px;
  }

  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;}
  .kicker{font-size:15px;font-weight:400;color:#6a6a72;letter-spacing:1px;}
  #game-name{
    font-size:30px;font-weight:600;color:#f0f0ee;line-height:1.15;margin:6px 0 0;max-width:480px;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  }
  .pctblock{text-align:right;flex:none;}
  .pctblock #percent{font-size:46px;font-weight:600;line-height:1;}
  .pctblock #count{font-size:16px;color:#9a9aa0;margin-top:6px;}

  #probar{display:block;width:100%;height:18px;margin:26px 0 24px;}

  .seclabel{font-size:15px;font-weight:400;color:#6a6a72;letter-spacing:.5px;}
  .achievement-list{display:flex;flex-direction:column;gap:13px;margin-top:14px;}
  .achievement-item{display:flex;align-items:center;gap:16px;min-width:0;}
  .achievement-item img{
    width:46px;height:46px;flex:none;border-radius:9px;
    background:rgba(240,240,238,0.06);
    box-shadow:inset 0 0 0 1px rgba(240,240,238,0.10);
    filter:grayscale(1) contrast(1.02) brightness(1.05);
  }
  .achievement-info{overflow:hidden;min-width:0;}
  .achievement-name{font-size:17px;font-weight:600;color:#f0f0ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .achievement-sub{font-size:13px;color:#8a8a90;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty{font-size:14px;color:#8a8a90;}
</style>
</head>
<body>

<div id="tracker">
  <div class="top">
    <div>
      <div class="kicker">// observation.active</div>
      <h2 id="game-name">vérification de Steam...</h2>
    </div>
    <div class="pctblock">
      <div id="percent">0%</div>
      <div id="count">— / — specimens</div>
    </div>
  </div>

  <canvas id="probar"></canvas>

  <div class="seclabel">// derniers spécimens isolés</div>
  <div id="latest-achievements" class="achievement-list">
    <div class="achievement-item"><div class="empty">en attente de données...</div></div>
  </div>
</div>

<script>
  // ---- barre de progression organique ----
  const cv = document.getElementById('probar');
  let targetPct = 0, curPct = 0;
  function rr(ctx,x,y,w,h,r){ r=Math.min(r,h/2,w/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function drawBar(){
    const dpr = 2, cssW = cv.clientWidth, cssH = cv.clientHeight;
    if (cssW < 2){ requestAnimationFrame(drawBar); return; }
    if (cv.width !== cssW*dpr){ cv.width = cssW*dpr; cv.height = cssH*dpr; }
    const ctx = cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,cssW,cssH);
    const h = cssH, r = h/2, W = cssW;
    rr(ctx,0,0,W,h,r); ctx.fillStyle = 'rgba(240,240,238,0.10)'; ctx.fill();
    curPct += (targetPct - curPct) * 0.07;
    const fx = Math.max(0, Math.min(W, W*curPct));
    if (fx > 0.6){
      ctx.save(); rr(ctx,0,0,W,h,r); ctx.clip();
      const t = performance.now()/1000, amp = Math.min(3.5, fx*0.5), steps = 12;
      ctx.beginPath(); ctx.moveTo(-2,-2); ctx.lineTo(fx,0);
      for (let i=0;i<=steps;i++){ const yy=(i/steps)*h; ctx.lineTo(fx + Math.sin(yy*0.55 + t*2.0)*amp, yy); }
      ctx.lineTo(-2,h+2); ctx.closePath();
      ctx.fillStyle = '#f0f0ee'; ctx.fill();
      ctx.restore();
    }
    requestAnimationFrame(drawBar);
  }
  (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve()).then(()=>requestAnimationFrame(drawBar));

  // ---- suivi des succès Steam ----
  async function updateTracker() {
    console.log("[TRACKER] Vérification de l'activité en jeu...");
    try {
      const response = await fetch('http://localhost:3000/api/achievements');
      const data = await response.json();

      if (data.playing) {
        console.log(`[TRACKER] Le joueur est sur : ${data.gameName}`);
        if (data.gameName === "Popcorn" || data.gameId === "1817070") {
          document.getElementById('game-name').innerText = "Marvel's Spider-Man Remastered";
        } else {
          document.getElementById('game-name').innerText = data.gameName;
        }

        const total = data.achievements.length;
        const unlockedAchievements = data.achievements.filter(a => a.achieved);
        const unlockedCount = unlockedAchievements.length;
        const percent = total > 0 ? (unlockedCount / total) * 100 : 0;

        targetPct = percent / 100;
        document.getElementById('percent').innerText = `${Math.round(percent)}%`;
        document.getElementById('count').innerText = `${unlockedCount} / ${total} specimens`;

        const lastThree = unlockedAchievements.slice(-3).reverse();
        const listContainer = document.getElementById('latest-achievements');
        listContainer.innerHTML = '';

        if (lastThree.length === 0) {
          listContainer.innerHTML = '<div class="achievement-item"><div class="empty">aucun spécimen isolé pour le moment</div></div>';
        } else {
          lastThree.forEach((ach, i) => {
            const item = document.createElement('div');
            item.className = 'achievement-item';
            const iconUrl = ach.icon || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            const idx = String(unlockedCount - i).padStart(3, '0');
            const sub = ach.description ? ach.description : `specimen_${idx} · isolé`;
            item.innerHTML = `
              <img src="${iconUrl}" alt="">
              <div class="achievement-info">
                <div class="achievement-name">${ach.name}</div>
                <div class="achievement-sub">${sub}</div>
              </div>`;
            listContainer.appendChild(item);
          });
        }
      } else {
        console.log("[TRACKER] Aucun jeu actif détecté.");
        document.getElementById('game-name').innerText = "aucun spécimen détecté";
        targetPct = 0;
        document.getElementById('percent').innerText = "0%";
        document.getElementById('count').innerText = "— / — specimens";
        document.getElementById('latest-achievements').innerHTML =
          '<div class="achievement-item"><div class="empty">lancez un jeu sur Steam</div></div>';
      }
    } catch (e) {
      console.error("[TRACKER] Erreur réseau lors du fetch :", e.message);
      document.getElementById('game-name').innerText = "connexion API perdue";
      targetPct = 0;
      document.getElementById('percent').innerText = "0%";
      document.getElementById('count').innerText = "— / — specimens";
    }
  }

  setInterval(updateTracker, 10000);
  updateTracker();
</script>
</body>
</html>
