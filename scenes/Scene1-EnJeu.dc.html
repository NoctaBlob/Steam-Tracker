<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0c; }
  </style>
</helmet>
<div style="background:#0a0a0c; width:max-content; line-height:0;">
  <canvas ref="{{ canvasRef }}" width="3840" height="2160" style="display:block;"></canvas>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  canvasRef = (el) => { if (el && !this.canvas) { this.canvas = el; this._boot(); } };

  renderVals() { return { canvasRef: this.canvasRef }; }

  _boot() {
    const W = 3840, H = 2160, TAU = Math.PI * 2;
    this.W = W; this.H = H; this.TAU = TAU;
    this.ctx = this.canvas.getContext('2d');

    // ---- Blobs ----
    const rand = (a, b) => a + Math.random() * (b - a);
    const mkHarmonics = (set) => set.map(h => ({ ...h, phase: Math.random() * TAU }));

    this.main = {
      cx: 0.18 * W, cy: 0.47 * H, R: 380, cycle: 7.0, opacity: 1,
      harm: mkHarmonics([
        { k: 2, amp: 0.075, tw: 0.85 },
        { k: 3, amp: 0.050, tw: 1.30 },
        { k: 5, amp: 0.030, tw: 0.55 },
        { k: 7, amp: 0.018, tw: 1.70 }
      ])
    };

    const mkWander = () => ({
      tx: rand(160, W - 160), ty: rand(160, H - 160),
      vx: 0, vy: 0, speed: rand(85, 165)
    });

    this.satellites = [
      { homeX: 0.66 * W, homeY: 0.28 * H, R: 150, cycle: rand(3, 5), fade: { period: 11, phase: 0 }, titleSeeker: true },
      { homeX: 0.82 * W, homeY: 0.64 * H, R: 108, cycle: rand(5, 9), fade: { period: 17, phase: 4 }, titleSeeker: true },
      { homeX: 0.55 * W, homeY: 0.78 * H, R: 84,  cycle: rand(4, 7), fade: null },
      { homeX: 0.40 * W, homeY: 0.22 * H, R: 122, cycle: rand(4, 8), fade: { period: 14, phase: 8 } },
      { homeX: 0.90 * W, homeY: 0.44 * H, R: 70,  cycle: rand(3, 6), fade: null }
    ].map(s => ({
      ...s, cx: s.homeX, cy: s.homeY, opacity: 1, wander: mkWander(),
      harm: mkHarmonics([
        { k: 2, amp: 0.10, tw: 1.0 },
        { k: 3, amp: 0.06, tw: 1.4 },
        { k: 5, amp: 0.035, tw: 0.7 }
      ])
    }));

    this.UM_PER_PX = 0.205;     // échelle de mesure
    this.measuredUm = null;     // valeur lissée affichée
    this.labText = 'Specimen_001 \u00b7 observation.active';
    this.glyphs = '\u2593\u2592\u2591#%*/\\|=+<>';
    this.t0 = performance.now();

    const start = () => this._loop();
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(start); else start();
  }

  // rayon du blob à un angle donné, à l'instant t
  _radiusAt(blob, ang, t) {
    let m = 1, baseW = this.TAU / blob.cycle;
    for (const h of blob.harm) m += h.amp * Math.sin(h.k * ang + h.tw * baseW * t + h.phase);
    return blob.R * m;
  }

  _blobPath(blob, t, N) {
    const pts = [];
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (let i = 0; i < N; i++) {
      const ang = (i / N) * this.TAU;
      const r = this._radiusAt(blob, ang, t);
      const x = blob.cx + Math.cos(ang) * r;
      const y = blob.cy + Math.sin(ang) * r;
      pts.push([x, y]);
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
    return { pts, minX, maxX, minY, maxY };
  }

  // test d'appartenance (échantillonné, suffisant pour le texte)
  _inside(blob, px, py, t) {
    const dx = px - blob.cx, dy = py - blob.cy;
    const ang = Math.atan2(dy, dx);
    const d = Math.hypot(dx, dy);
    return d <= this._radiusAt(blob, ang, t);
  }

  _drawBlobShape(ctx, pts, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) {
      const p0 = pts[i - 1], p1 = pts[i];
      const mx = (p0[0] + p1[0]) / 2, my = (p0[1] + p1[1]) / 2;
      ctx.quadraticCurveTo(p0[0], p0[1], mx, my);
    }
    const last = pts[pts.length - 1], first = pts[0];
    ctx.quadraticCurveTo(last[0], last[1], (last[0] + first[0]) / 2, (last[1] + first[1]) / 2);
    ctx.closePath();
    ctx.fillStyle = '#f0f0ee';
    ctx.fill();
    ctx.restore();
  }

  // ---- Grille microscopique distordue ----
  _drawGrid(ctx, t) {
    const { W, H } = this;
    const step = 110, infl = 230, pull = 34;
    const b = this.main;
    const avgR = b.R;
    ctx.save();
    ctx.strokeStyle = '#1e1e24';
    ctx.lineWidth = 1.4;
    ctx.setLineDash([4, 8]);

    const warp = (x, y) => {
      const dx = x - b.cx, dy = y - b.cy, d = Math.hypot(dx, dy);
      const edge = avgR + infl;
      if (d >= edge || d < 1) return [x, y];
      const f = 1 - Math.max(0, (d - avgR) / infl); // 0 au bord d'influence, 1 au contour
      const s = f * f * pull;
      return [x - (dx / d) * s, y - (dy / d) * s];
    };

    // verticales
    for (let gx = 0; gx <= W; gx += step) {
      ctx.beginPath();
      const near = Math.abs(gx - b.cx) < avgR + infl;
      if (!near) { ctx.moveTo(gx, 0); ctx.lineTo(gx, H); }
      else {
        let first = true;
        for (let gy = 0; gy <= H; gy += 22) {
          const [wx, wy] = warp(gx, gy);
          if (first) { ctx.moveTo(wx, wy); first = false; } else ctx.lineTo(wx, wy);
        }
      }
      ctx.stroke();
    }
    // horizontales
    for (let gy = 0; gy <= H; gy += step) {
      ctx.beginPath();
      const near = Math.abs(gy - b.cy) < avgR + infl;
      if (!near) { ctx.moveTo(0, gy); ctx.lineTo(W, gy); }
      else {
        let first = true;
        for (let gx = 0; gx <= W; gx += 22) {
          const [wx, wy] = warp(gx, gy);
          if (first) { ctx.moveTo(wx, wy); first = false; } else ctx.lineTo(wx, wy);
        }
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // ---- Règle de mesure verticale réactive ----
  _drawRuler(ctx, geo) {
    const x = geo.minX - 96;
    const top = geo.minY, bot = geo.maxY;
    const heightPx = bot - top;
    const target = heightPx * this.UM_PER_PX;
    this.measuredUm = this.measuredUm == null ? target : this.measuredUm + (target - this.measuredUm) * 0.08;

    ctx.save();
    ctx.strokeStyle = 'rgba(240,240,238,0.35)';
    ctx.lineWidth = 1.4;
    // ligne principale
    ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bot); ctx.stroke();
    // embouts
    ctx.beginPath();
    ctx.moveTo(x - 22, top); ctx.lineTo(x + 22, top);
    ctx.moveTo(x - 22, bot); ctx.lineTo(x + 22, bot);
    ctx.stroke();
    // graduations
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let yy = top; yy <= bot; yy += 40) {
      const major = Math.round((yy - top) / 40) % 5 === 0;
      ctx.moveTo(x, yy); ctx.lineTo(x + (major ? 16 : 9), yy);
    }
    ctx.stroke();

    // valeur en μm
    ctx.setLineDash([]);
    ctx.fillStyle = '#555550';
    ctx.font = "500 30px 'IBM Plex Mono', monospace";
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    const my = (top + bot) / 2;
    ctx.save();
    ctx.translate(x - 34, my);
    ctx.rotate(-Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.fillText(this.measuredUm.toFixed(1) + ' \u00b5m', 0, 0);
    ctx.restore();

    ctx.font = "400 22px 'IBM Plex Mono', monospace";
    ctx.textAlign = 'left';
    ctx.fillText('H', x + 26, top + 18);
    ctx.restore();
  }

  // ---- Texte labo + glitch quand le blob passe devant ----
  _coveredByAny(px, py, t) {
    if (this._inside(this.main, px, py, t)) return true;
    for (const s of this.satellites) {
      if (s.opacity > 0.45 && this._inside(s, px, py, t)) return true;
    }
    return false;
  }

  _drawLabText(ctx, t) {
    ctx.save();
    ctx.font = "400 32px 'IBM Plex Mono', monospace";
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    const total = ctx.measureText(this.labText).width;
    const y0 = this.H / 2;
    let x = this.W / 2 - total / 2;
    for (const ch of this.labText) {
      const w = ctx.measureText(ch).width || 18;
      const cx = x + w / 2;
      const inside = this._coveredByAny(cx, y0, t);
      let glyph = ch, dy = 0;
      if (inside && ch !== ' ') {
        // glitch subtil : scramble + léger décalage, qui se reforme
        if (Math.random() < 0.32) glyph = this.glyphs[(Math.random() * this.glyphs.length) | 0];
        dy = (Math.random() - 0.5) * 7;
        ctx.fillStyle = '#26262b';
      } else {
        ctx.fillStyle = '#3a3a40';
      }
      ctx.fillText(glyph, x, y0 + dy);
      x += w;
    }
    ctx.restore();
  }

  _loop = () => {
    const ctx = this.ctx, { W, H } = this;
    const t = (performance.now() - this.t0) / 1000;
    const dt = this._lastT == null ? 0.016 : Math.min(0.05, t - this._lastT);
    this._lastT = t;

    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(0, 0, W, H);

    this._drawGrid(ctx, t);

    // blob principal
    const mainGeo = this._blobPath(this.main, t, 190);
    this._drawRuler(ctx, mainGeo);

    // satellites (sous le principal pour la profondeur)
    for (const s of this.satellites) {
      const w = s.wander;
      const dx = w.tx - s.cx, dy = w.ty - s.cy, d = Math.hypot(dx, dy) || 1;
      if (d < 50) {
        if (s.titleSeeker && Math.random() < 0.55) {
          w.tx = W / 2 + (Math.random() - 0.5) * 1000;
          w.ty = H / 2 + (Math.random() - 0.5) * 280;
        } else {
          w.tx = 160 + Math.random() * (W - 320);
          w.ty = 160 + Math.random() * (H - 320);
        }
        w.speed = 85 + Math.random() * 85;
      }
      const dvx = (dx / d) * w.speed, dvy = (dy / d) * w.speed;
      w.vx += (dvx - w.vx) * Math.min(1, dt * 1.3);
      w.vy += (dvy - w.vy) * Math.min(1, dt * 1.3);
      s.cx += w.vx * dt;
      s.cy += w.vy * dt;
      if (s.fade) {
        const ph = (this.TAU / s.fade.period) * t + s.fade.phase;
        s.opacity = 0.18 + 0.82 * (0.5 + 0.5 * Math.sin(ph));
      }
      const g = this._blobPath(s, t, 120);
      this._drawBlobShape(ctx, g.pts, s.opacity);
    }

    this._drawBlobShape(ctx, mainGeo.pts, this.main.opacity);
    this._drawLabText(ctx, t);

    this.raf = requestAnimationFrame(this._loop);
  };

  componentWillUnmount() { if (this.raf) cancelAnimationFrame(this.raf); }
}
</script>
</body>
</html>
