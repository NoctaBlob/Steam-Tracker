<meta charset="UTF-8" data-om-id="bc01f935:2">
<title>NOCTABLOB · Steam Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com" data-om-id="bc01f935:3">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin data-om-id="bc01f935:4">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" data-om-id="bc01f935:5">
<style>
  :root{
    --bg:#0e0e10; --grid:#17171b;
    --spec:#f0f0ee; --g1:#b6b6bc; --g2:#8a8a90; --g3:#6a6a72; --g4:#46464d;
    --line:rgba(240,240,238,0.10); --tick:rgba(240,240,238,0.32);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;}
  body{font-family:'IBM Plex Mono',monospace;color:var(--spec);-webkit-font-smoothing:antialiased;}

  /* cadre natif 4K — le reste est transparent (compositing OBS) */
  #stage{position:relative;width:3840px;height:2160px;overflow:hidden;}

  /* colonne docquée gauche ~30% */
  #panel{
    position:absolute;top:0;left:0;bottom:0;width:1150px;
    background:rgba(14,14,16,0.82);
    background-image:radial-gradient(circle, var(--grid) 2px, transparent 2px);
    background-size:34px 34px;
    border-right:2px solid var(--line);
    padding:96px 90px 84px;
    display:flex;flex-direction:column;
  }
  /* ticks de repérage dans les coins du panneau */
  .tick{position:absolute;width:34px;height:34px;pointer-events:none;}
  .tick::before,.tick::after{content:"";position:absolute;background:var(--tick);}
  .tick::before{width:34px;height:4px;}
  .tick::after{width:4px;height:34px;}
  .tick.tl{top:34px;left:34px;}      .tick.tl::before{top:0;left:0;}     .tick.tl::after{top:0;left:0;}
  .tick.tr{top:34px;right:34px;}     .tick.tr::before{top:0;right:0;}    .tick.tr::after{top:0;right:0;}
  .tick.bl{bottom:34px;left:34px;}   .tick.bl::before{bottom:0;left:0;}  .tick.bl::after{bottom:0;left:0;}
  .tick.br{bottom:34px;right:34px;}  .tick.br::before{bottom:0;right:0;} .tick.br::after{bottom:0;right:0;}

  /* en-tête */
  .kicker{font-size:30px;font-weight:400;color:var(--g3);letter-spacing:2px;}
  .title{font-size:78px;font-weight:600;color:var(--spec);letter-spacing:1px;line-height:1;margin:18px 0 0;}
  .subtitle{font-size:28px;font-weight:400;color:var(--g2);margin:20px 0 0;}

  /* règle de mesure sous l'en-tête */
  .ruler{position:relative;height:30px;margin:40px 0 6px;}
  .ruler .bar{position:absolute;top:14px;left:0;right:0;height:2px;background:rgba(240,240,238,0.16);}
  .ruler .cap{position:absolute;top:0;width:2px;height:30px;background:rgba(240,240,238,0.16);}
  .ruler .cap.l{left:0;} .ruler .cap.r{right:0;}
  .ruler .lab{position:absolute;top:-4px;right:0;font-size:22px;color:var(--g3);}

  /* liste */
  #backlog{
    position:relative;flex:1;min-height:0;margin-top:30px;
    display:flex;flex-direction:column;gap:46px;
    overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, #000 calc(100% - 90px), transparent);
            mask-image:linear-gradient(to bottom, #000 calc(100% - 90px), transparent);
  }
  .game-block{display:flex;flex-direction:column;gap:16px;}
  .g-head{display:flex;align-items:baseline;gap:20px;min-width:0;}
  .g-idx{font-size:26px;font-weight:400;color:var(--g4);flex:none;letter-spacing:1px;}
  .game-title{font-size:38px;font-weight:600;color:var(--spec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .g-bar{display:block;width:100%;height:20px;}
  .game-info{display:flex;justify-content:space-between;align-items:baseline;font-size:26px;}
  .game-info .pc{color:var(--g1);font-weight:500;}
  .game-info .ct{color:var(--g3);}

  .state{font-size:30px;color:var(--g2);line-height:1.5;}
  .state.err{color:#c9c9c4;}

  /* pied */
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:34px;font-size:26px;color:var(--g4);letter-spacing:1px;}
  .caret{display:inline-block;width:18px;height:30px;background:var(--g3);margin-left:6px;animation:blink 1.1s steps(1) infinite;vertical-align:-4px;}
  @keyframes blink{50%{opacity:0;}}
</style>
</head>
<body data-om-id="bc01f935:6">

<div id="stage" data-om-id="bc01f935:7">
  <div id="panel" data-om-id="bc01f935:8">
    <span class="tick tl" data-om-id="bc01f935:9"></span><span class="tick tr" data-om-id="bc01f935:10"></span>
    <span class="tick bl" data-om-id="bc01f935:11"></span><span class="tick br" data-om-id="bc01f935:12"></span>

    <div class="kicker" data-om-id="bc01f935:13">// FIG.07 · library.backlog</div>
    <h1 class="title" data-om-id="bc01f935:14">BIBLIOTHÈQUE</h1>
    <div class="subtitle" data-om-id="bc01f935:15">specimens en cours d'isolement</div>

    <div class="ruler" data-om-id="bc01f935:16"><span class="cap l" data-om-id="bc01f935:17"></span><span class="bar" data-om-id="bc01f935:18"></span><span class="cap r" data-om-id="bc01f935:19"></span><span class="lab" data-om-id="bc01f935:20">µm</span></div>

    <div id="backlog" data-om-id="bc01f935:21">
      <div class="state" data-om-id="bc01f935:22">initialisation du protocole...</div>
    </div>

    <div class="foot" data-om-id="bc01f935:23">
      <span id="foot-count" data-om-id="bc01f935:24">// noctablob.lab</span>
      <span data-om-id="bc01f935:25"><span class="caret" data-om-id="bc01f935:26"></span></span>
    </div>
  </div>
</div>

<script>
  // ===== barres organiques (bord ondulant, monochrome) — un seul loop partagé =====
  function rr(ctx,x,y,w,h,r){ r=Math.min(r,h/2,w/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function drawBars(){
    const t = performance.now()/1000;
    document.querySelectorAll('.g-bar').forEach(cv => {
      const dpr=2, cssW=cv.clientWidth, cssH=cv.clientHeight;
      if (cssW<2) return;
      if (cv.width!==cssW*dpr){ cv.width=cssW*dpr; cv.height=cssH*dpr; cv._cur=0; }
      const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,cssW,cssH);
      const h=cssH, r=h/2, W=cssW;
      rr(ctx,0,0,W,h,r); ctx.fillStyle='rgba(240,240,238,0.10)'; ctx.fill();
      const target=parseFloat(cv.dataset.pct)||0;
      cv._cur = cv._cur==null ? 0 : cv._cur + (target - cv._cur)*0.07;
      const fx=Math.max(0,Math.min(W,W*cv._cur));
      if (fx>0.6){
        ctx.save(); rr(ctx,0,0,W,h,r); ctx.clip();
        const amp=Math.min(3.5, fx*0.5), steps=12;
        ctx.beginPath(); ctx.moveTo(-2,-2); ctx.lineTo(fx,0);
        for (let i=0;i<=steps;i++){ const yy=(i/steps)*h; ctx.lineTo(fx + Math.sin(yy*0.45 + t*2.0)*amp, yy); }
        ctx.lineTo(-2,h+2); ctx.closePath(); ctx.fillStyle='#f0f0ee'; ctx.fill(); ctx.restore();
      }
    });
    requestAnimationFrame(drawBars);
  }
  (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve()).then(()=>requestAnimationFrame(drawBars));

  // ===== récupération de la bibliothèque (logique préservée) =====
  async function loadBacklog() {
    console.log("[FRONT] Tentative de récupération de la bibliothèque depuis l'API...");
    try {
      const response = await fetch('http://localhost:3000/api/library');
      console.log(`[FRONT] Statut HTTP reçu : ${response.status}`);

      if (!response.ok) {
        throw new Error(`Le serveur backend a renvoyé une erreur ${response.status}`);
      }

      const jeux = await response.json();
      console.log("[FRONT] Données JSON lues avec succès. Nombre de jeux reçus :", jeux.length);

      const container = document.getElementById('backlog');
      if (!container) {
        console.error("[FRONT] Erreur critique : Élément HTML avec l'ID 'backlog' introuvable dans le DOM.");
        return;
      }

      container.innerHTML = '';

      if (jeux.length === 0) {
        container.innerHTML = '<div class="state">aucun spécimen chargé · vérifiez les logs serveur</div>';
        document.getElementById('foot-count').innerText = '// noctablob.lab';
        return;
      }

      jeux.forEach((jeu, i) => {
        const block = document.createElement('div');
        block.className = 'game-block';
        const idx = String(i + 1).padStart(2, '0');
        block.innerHTML = `
          <div class="g-head">
            <span class="g-idx">07·${idx}</span>
            <span class="game-title">${jeu.gameName}</span>
          </div>
          <canvas class="g-bar" data-pct="${(jeu.percent || 0) / 100}"></canvas>
          <div class="game-info">
            <span class="pc">${jeu.percent}% analysé</span>
            <span class="ct">${jeu.unlocked} / ${jeu.total} specimens</span>
          </div>
        `;
        container.appendChild(block);
      });
      document.getElementById('foot-count').innerText = `// ${jeux.length} titres catalogués`;
      console.log("[FRONT] Interface mise à jour graphiquement.");
    } catch (e) {
      console.error("[FRONT] Erreur attrapée lors du fetch :", e.message);
      document.getElementById('backlog').innerHTML =
        '<div class="state err">connexion API perdue · localhost:3000 injoignable (voir F12)</div>';
      document.getElementById('foot-count').innerText = '// status: error';
    }
  }
  loadBacklog();
  setInterval(loadBacklog, 60000);
</script>
</body>
