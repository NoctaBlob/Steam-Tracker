services:
  steam-api:
    # REMPLACEZ par l'adresse de votre Container Registry GitLab
    image: ghcr.io/noctablob/steam-tracker:latest
    container_name: steam-api-server
    ports:
      - "3000:3000"
    environment:
      - STEAM_API_KEY=${STEAM_API_KEY}
      - STEAM_ID=${STEAM_ID}
    restart: unless-stopped

  steam-ui:
    image: nginx:alpine
    container_name: steam-api-ui
    ports:
      - "8080:80"
    volumes:
      # On monte tout ton dossier de dev actuel (.) dans le dossier HTML de Nginx
      - .:/usr/share/nginx/html:ro
    restart: unless-stopped