services:
  steam-api:
    image: ghcr.io/noctablob/steam-tracker:latest
    container_name: steam-api-server
    pull_policy: build
    ports:
      - "3000:3000"
    environment:
      - STEAM_API_KEY=${STEAM_API_KEY}
      - STEAM_ID=${STEAM_ID}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: node --watch server.js
    restart: unless-stopped

  steam-ui:
    image: nginx:alpine
    container_name: steam-api-ui
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html:ro
    restart: unless-stopped